<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; background: #1c1c1c; color: white; text-align: center; padding: 20px; }
        .hidden { display: none; }
        input { padding: 10px; margin: 10px; border-radius: 5px; border: none; width: 80%; }
        button { background: #0088cc; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #profile-icon { position: absolute; top: 10px; right: 10px; font-size: 24px; display: none; }
        .card { background: #2a2a2a; padding: 15px; margin: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="profile-icon">👤</div>

    <!-- ЭКРАН ВХОДА -->
    <div id="auth-screen">
        <h2>Верификация</h2>
        <p>Введите ваш ник в Telegram:</p>
        <input type="text" id="username" placeholder="@username">
        <button onclick="requestCode()">Получить код</button>
        
        <div id="code-section" class="hidden">
            <p>Введите 5-значный код из бота:</p>
            <input type="number" id="v-code" placeholder="00000">
            <button onclick="verifyCode()">Войти</button>
        </div>
    </div>

    <!-- МАГАЗИН (СКРЫТ ПО УМОЛЧАНИЮ) -->
    <div id="shop-screen" class="hidden">
        <h2>Магазин Roblox</h2>
        <div class="card">
            <h3>Shadow Dragon</h3>
            <button onclick="buy('Shadow Dragon')">Купить</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function requestCode() {
            let user = document.getElementById('username').value;
            if(user.length > 2) {
                tg.sendData("get_code"); // Просим бота прислать код
                document.getElementById('code-section').classList.remove('hidden');
            }
        }

        function verifyCode() {
            let code = document.getElementById('v-code').value;
            // В реальности проверку лучше делать через сервер, но для примера отправим боту
            tg.sendData("verify:" + code);
            
            // Имитируем успешный вход для интерфейса
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('shop-screen').classList.remove('hidden');
            document.getElementById('profile-icon').style.display = 'block';
        }

        function buy(item) {
            tg.sendData("buy:" + item);
            tg.close();
        }
    </script>
</body>
</html>
