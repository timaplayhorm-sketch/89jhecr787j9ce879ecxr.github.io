<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunny Shop Verification</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; text-align: center; padding: 20px; margin: 0; }
        .auth-container { background: #1a1a1a; padding: 30px; border-radius: 25px; margin-top: 50px; border: 1px solid #3399ff; box-shadow: 0 0 20px rgba(51, 153, 255, 0.2); }
        h2 { color: #3399ff; margin-bottom: 10px; }
        p { color: #888; font-size: 14px; }
        input { width: 85%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #222; color: white; font-size: 18px; text-align: center; outline: none; }
        input:focus { border-color: #3399ff; }
        .btn { width: 90%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-blue { background: #3399ff; color: white; }
        .btn-green { background: #28a745; color: white; margin-top: 10px; }
        #profile-icon { position: fixed; top: 15px; right: 15px; background: #3399ff; padding: 6px 12px; border-radius: 20px; display: none; font-weight: bold; font-size: 12px; }
        .hidden { display: none; }
        .shop-content { margin-top: 30px; }
    </style>
</head>
<body>

    <div id="profile-icon">👤 VERIFIED</div>

    <div id="auth-box" class="auth-container">
        <h2>Авторизація</h2>
        
        <!-- Крок 1: Введення нікнейму -->
        <div id="step-nick">
            <p>Введіть ваш нікнейм у Telegram</p>
            <input type="text" id="user-nick" placeholder="@username">
            <button class="btn btn-blue" onclick="sendCode()">Отримати код</button>
        </div>

        <!-- Крок 2: Введення коду -->
        <div id="step-code" class="hidden">
            <p>Код надіслано в чат з ботом. Введіть його нижче:</p>
            <input type="number" id="auth-code" placeholder="0 0 0 0 0">
            <button class="btn btn-green" onclick="verify()">Підтвердити</button>
        </div>
    </div>

    <!-- Магазин (спочатку прихований) -->
    <div id="shop-box" class="shop-content hidden">
        <h2 style="color: #ffcc00;">🛒 Магазин Roblox</h2>
        <div style="background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333;">
            <h3>Shadow Dragon</h3>
            <button class="btn btn-blue" onclick="alert('Замовлення прийнято!')">Придбати</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const botToken = '8557677135:AAH9yPGPO8d3Zzj5mYUI-3BtoI_BE-RZIw0';
        let correctCode = null;

        async function sendCode() {
            let nick = document.getElementById('user-nick').value;
            if (nick.length < 3) {
                alert("Введіть коректний нікнейм!");
                return;
            }

            // Геруємо код
            correctCode = Math.floor(10000 + Math.random() * 90000);
            
            // Отримуємо ID користувача з даних Telegram WebApp
            let chatId = tg.initDataUnsafe.user.id;
            let message = `🔐 <b>Верифікація</b>\nКористувач: <b>${nick}</b>\nТвій код доступу: <code>${correctCode}</code>`;
            
            // Надсилаємо повідомлення через Telegram API
            const url = `https://telegram.org{botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=HTML`;

            try {
                let response = await fetch(url);
                if (response.ok) {
                    document.getElementById('step-nick').classList.add('hidden');
                    document.getElementById('step-code').classList.remove('hidden');
                } else {
                    alert("Помилка! Спочатку запустіть бота в чаті.");
                }
            } catch (e) {
                alert("Помилка мережі.");
            }
        }

        function verify() {
            let userInp = document.getElementById('auth-code').value;
            if (userInp == correctCode) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('shop-box').classList.remove('hidden');
                document.getElementById('profile-icon').style.display = 'block';
            } else {
                alert("Невірний код! Спробуйте ще раз.");
            }
        }
    </script>
</body>
</html>
