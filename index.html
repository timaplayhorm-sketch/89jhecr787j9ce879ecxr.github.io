<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Shop Premium</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --mm2-color: #ff4d4d;
            --adopt-color: #00ff88;
            --accent-gold: #ffcc00;
            --bg-main: #080808;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-main);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        #cart-btn {
            position: fixed; top: 15px; right: 15px;
            background: var(--accent-gold); color: #000;
            padding: 12px 20px; border-radius: 50px;
            cursor: pointer; font-weight: 900; z-index: 1000;
            box-shadow: 0 10px 20px rgba(255, 204, 0, 0.2);
            font-size: 14px;
        }

        #cart-modal {
            display: none; position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(15, 15, 15, 0.98); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 30px; width: 90%; max-width: 450px; z-index: 1001;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000;
        }

        #contact-btn {
            display: none;
            background: #0088cc;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 900;
            margin-top: 15px;
        }

        #selection-screen { text-align: center; margin-top: 80px; width: 100%; }
        .cards-container { display: flex; flex-direction: column; gap: 30px; align-items: center; margin-bottom: 50px; }
        .game-card { width: 90%; max-width: 450px; background: var(--glass); border-radius: 25px; padding: 20px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .game-card:hover { transform: scale(1.02); background: rgba(255,255,255,0.1); }
        .game-logo { width: 100%; height: 200px; object-fit: cover; border-radius: 15px; }

        .shop-view { display: none; width: 95%; max-width: 1200px; margin-top: 50px; padding-bottom: 100px; }
        .shop-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; }
        #sort-select { padding: 12px 15px; min-width: 210px; border-radius: 12px; background: #1a1a1a; color: #fff; border: 1px solid #444; font-family: inherit; font-weight: 700; cursor: pointer; }
        .back-btn { background: #222; color: #fff; border: 1px solid #444; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }

        .item-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .item-card { background: var(--glass); border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .item-card img { width: 100%; height: 180px; object-fit: contain; margin-bottom: 15px; border-radius: 10px; }
        .item-price { font-size: 28px; font-weight: 900; margin: 15px 0; }
        
        .buy-button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .buy-button:active { transform: scale(0.95); }

        .mm2-theme #shop-title, .mm2-theme .item-price { color: var(--mm2-color); }
        .mm2-theme .buy-button { background: var(--mm2-color); color: white; }
        .adopt-theme #shop-title, .adopt-theme .item-price { color: var(--adopt-color); }
        .adopt-theme .buy-button { background: var(--adopt-color); color: #000; }

        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; margin-bottom: 5px; }
        .remove-item { color: #ff4d4d; cursor: pointer; font-weight: bold; padding: 5px; }
    </style>
</head>
<body>

    <div id="cart-btn" onclick="toggleCart()">🛒 <span id="cart-count">0</span> тов.</div>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div id="cart-modal">
        <h2 id="modal-title">Корзина</h2>
        <div id="cart-list" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;"></div>
        <h3 id="total-text">Итого: <span id="cart-total">0</span> грн</h3>
        
        <button id="checkout-btn" class="buy-button" style="background:var(--accent-gold); color:#000" onclick="checkout()">Оформить заказ</button>
        
        <a href="https://t.me/bunnytail_info" id="contact-btn">НАПИСАТЬ ПРОДАВЦУ</a>
    </div>

    <div id="selection-screen">
        <h1 style="text-transform: uppercase; letter-spacing: 3px;">Выберите игру</h1>
        <div class="cards-container">
            <div class="game-card" onclick="openShop('mm2')">
                <img src="https://tr.rbxcdn.com/180DAY-fe7335c3ad752e84323cd81ae38de69a/768/432/Image/Webp/noFilter" class="game-logo">
                <h2>Murder Mystery 2</h2>
            </div>
            <div class="game-card" onclick="openShop('adopt')">
                <img src="https://tr.rbxcdn.com/180DAY-dc544ac25d03f485d6a58f79efc51ed2/768/432/Image/Webp/noFilter" class="game-logo">
                <h2>Adopt Me!</h2>
            </div>
        </div>
    </div>

    <div id="shop-view" class="shop-view">
        <div class="shop-controls">
            <button class="back-btn" onclick="goBack()">← НАЗАД</button>
            <select id="sort-select" onchange="applySort()">
                <option value="default">Сортировка цен</option>
                <option value="low">От дешевых</option>
                <option value="high">От дорогих</option>
            </select>
        </div>
        <h1 id="shop-title" style="text-align:center; font-size: 40px; margin-bottom: 30px;">STORE</h1>
        <div id="items-container" class="item-grid"></div>
    </div>

    <script>
        let cart = [];
        let currentShopItems = [];
        let currentGame = '';

        const data = {
            mm2: {
                title: "MM2 WEAPONS",
                items: [
                ]
            },
            adopt: {
                title: "ADOPT ME PETS",
                items: [
                    { name: "FR Arctic Dusk Dragon", price: 100, img: "https://static.wikia.nocookie.net/adoptme/images/2/26/Arctic_Dusk_Dragon.png/revision/latest?cb=20251203163008" },
                    { name: "FR Ancient Dragon", price: 35, img: "https://static.wikia.nocookie.net/adoptme/images/7/77/Ancient_Dragon.png/revision/latest/thumbnail/width/360/height/360?cb=20220721171733" },
                    { name: "R Golden Unicorn", price: 25, img: "https://static.wikia.nocookie.net/adoptme/images/9/99/GoldenUnicorn_Pet.png/revision/latest/thumbnail/width/360/height/360?cb=20200321150328" },
                    { name: "F Royal Capuchin Monkey", price: 120, img: "https://static.wikia.nocookie.net/adoptme/images/d/da/Royal_Capuchin_Monkey.png/revision/latest?cb=20240403164910" },
                    { name: "MR Samoyed", price: 45, img: "https://static.wikia.nocookie.net/adoptme/images/1/1d/Samoyed.png/revision/latest?cb=20251224163330" },
                    { name: "NFR Snow Cat", price: 55, img: "https://static.wikia.nocookie.net/adoptme/images/3/3e/Snow_Cat2.png/revision/latest/thumbnail/width/360/height/360?cb=20201112133059" },
                    { name: "NR Black-Footed Ferret", price: 25, img: "https://static.wikia.nocookie.net/adoptme/images/0/07/Black-Footed_Ferret.png/revision/latest?cb=20260302181041" }
                ]
            }
        };

        function openShop(game) {
            currentGame = game;
            currentShopItems = [...data[game].items];
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('shop-view').style.display = 'block';
            document.getElementById('shop-view').className = 'shop-view ' + game + '-theme';
            document.getElementById('shop-title').innerText = data[game].title;
            renderItems(currentShopItems);
        }

        function goBack() {
            document.getElementById('selection-screen').style.display = 'block';
            document.getElementById('shop-view').style.display = 'none';
            document.getElementById('sort-select').value = 'default';
        }

        function renderItems(items) {
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            items.forEach(item => {
                container.innerHTML += `
                    <div class="item-card">
                        <img src="${item.img}" alt="${item.name}">
                        <h3>${item.name}</h3>
                        <div class="item-price">${item.price} грн</div>
                        <button class="buy-button" onclick="addToCart('${item.name}', ${item.price})">В корзину</button>
                    </div>
                `;
            });
        }

        function applySort() {
            const mode = document.getElementById('sort-select').value;
            if (mode === 'low') {
                currentShopItems.sort((a, b) => a.price - b.price);
            } else if (mode === 'high') {
                currentShopItems.sort((a, b) => b.price - a.price);
            } else {
                currentShopItems = [...data[currentGame].items];
            }
            renderItems(currentShopItems);
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            updateCartUI();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-list');
            list.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                list.innerHTML += `
                    <div class="cart-item">
                        <span>${item.name}</span>
                        <span>${item.price} ₽ <span class="remove-item" onclick="removeFromCart(${index})">✕</span></span>
                    </div>
                `;
            });
            document.getElementById('cart-total').innerText = total;
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            const overlay = document.getElementById('overlay');
            const isVisible = modal.style.display === 'block';
            
            modal.style.display = isVisible ? 'none' : 'block';
            overlay.style.display = isVisible ? 'none' : 'block';
            
            // Сбрасываем кнопку контакта при открытии, если корзина пуста
            if (!isVisible && cart.length === 0) {
                document.getElementById('contact-btn').style.display = 'none';
                document.getElementById('checkout-btn').style.display = 'block';
            }
        }

        function checkout() {
    if (cart.length === 0) {
        // Вместо alert можно просто ничего не делать или вывести текст в модалку
        return; 
    }
    
    // Скрываем кнопку оформления и показываем кнопку связи
    document.getElementById('checkout-btn').style.display = 'none';
    document.getElementById('contact-btn').style.display = 'block';
    
    // Строку с alert я убрал, теперь окно выпрыгивать не будет
}

    </script>
</body>
</html>
