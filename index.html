<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Shop Center</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center; /* Центровка по горизонтали */
            min-height: 100vh;
        }

        /* Экран выбора */
        #selection-screen {
            text-align: center;
            margin-top: 10vh;
        }

        .select-title {
            font-size: clamp(24px, 5vw, 45px);
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .cards-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .game-card {
            width: 280px;
            background: #151515;
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            border: 2px solid #333;
            transition: 0.3s;
        }

        .game-card:hover { transform: translateY(-10px); border-color: #00ff88; }
        .game-card img { width: 100%; border-radius: 10px; }

        /* Магазин */
        .shop-view {
            display: none;
            width: 90%;
            max-width: 1100px;
            text-align: center; /* Центровка текста и заголовок */
            margin-top: 50px;
        }

        .shop-header {
            display: flex;
            flex-direction: column; /* Ставим кнопку и заголовок друг под другом */
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        #shop-title {
            font-size: 40px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .back-btn {
            background: #333;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            justify-content: center;
        }

        .item-card {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .item-card img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin-bottom: 15px;
            background: #252525; /* Фон для битых картинок */
            border-radius: 10px;
        }

        .item-price {
            font-size: 24px;
            margin: 10px 0;
            font-weight: 900;
        }

        .buy-button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Темы */
        .mm2-theme #shop-title { color: #ff4d4d; }
        .mm2-theme .item-price { color: #ff4d4d; }
        .mm2-theme .buy-button { background: #ff4d4d; color: #fff; }

        .adopt-theme #shop-title { color: #00ff88; }
        .adopt-theme .item-price { color: #00ff88; }
        .adopt-theme .buy-button { background: #00ff88; color: #000; }
    </style>
</head>
<body>

    <div id="selection-screen">
        <h1 class="select-title">Выбери игру</h1>
        <div class="cards-container">
            <div class="game-card" onclick="openShop('mm2')">
                <div style="font-size: 50px;">🔪</div>
                <h2>Murder Mystery 2</h2>
            </div>
            <div class="game-card" onclick="openShop('adopt')">
                <div style="font-size: 50px;">🐶</div>
                <h2>Adopt Me!</h2>
            </div>
        </div>
    </div>

    <div id="shop-view" class="shop-view">
        <div class="shop-header">
            <button class="back-btn" onclick="goBack()">← НАЗАД К ВЫБОРУ</button>
            <h1 id="shop-title">STORE</h1>
        </div>
        <div id="items-container" class="item-grid"></div>
    </div>

    <script>
        const data = {
            mm2: {
                title: "MM2 STORE",
                class: "mm2-theme",
                items: [
                    { name: "Nik's Scythe", price: "5,000 ₽", img: "https://placeholder.com" },
                    { name: "Batwing", price: "1,200 ₽", img: "https://placeholder.com" },
                    { name: "Candy Knife", price: "1,500 ₽", img: "https://placeholder.com" }
                ]
            },
            adopt: {
                title: "ADOPT ME SHOP",
                class: "adopt-theme",
                items: [
                    { name: "Shadow Dragon", price: "8,500 ₽", img: "https://placeholder.com" },
                    { name: "Frost Dragon", price: "4,200 ₽", img: "https://placeholder.com" },
                    { name: "Neon Owl", price: "3,100 ₽", img: "https://placeholder.com" }
                ]
            }
        };

        function openShop(game) {
            document.getElementById('selection-screen').style.display = 'none';
            const shop = document.getElementById('shop-view');
            const container = document.getElementById('items-container');
            
            shop.style.display = 'block';
            shop.className = 'shop-view ' + data[game].class;
            document.getElementById('shop-title').innerText = data[game].title;

            container.innerHTML = '';
            data[game].items.forEach(item => {
                container.innerHTML += `
                    <div class="item-card">
                        <img src="${item.img}" alt="${item.name}">
                        <h3>${item.name}</h3>
                        <div class="item-price">${item.price}</div>
                        <button class="buy-button">Купить сейчас</button>
                    </div>`;
            });
        }

        function goBack() {
            document.getElementById('selection-screen').style.display = 'block';
            document.getElementById('shop-view').style.display = 'none';
        }
    </script>
</body>
</html>
