<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .auth-card { background: #1e1e1e; padding: 25px; border-radius: 20px; margin-top: 50px; border: 1px solid #3399ff; }
        input { width: 80%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid #333; background: #252525; color: white; font-size: 18px; text-align: center; }
        button { width: 85%; padding: 12px; border-radius: 10px; border: none; background: #3399ff; color: white; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        #profile-icon { position: fixed; top: 15px; right: 15px; background: #3399ff; padding: 5px 12px; border-radius: 20px; display: none; font-size: 12px; }
    </style>
</head>
<body>

    <div id="profile-icon">👤 VERIFIED</div>

    <div id="auth-screen" class="auth-card">
        <h2>Bunny Shop Auth</h2>
        <div id="nick-step">
            <input type="text" id="user-nick" placeholder="Введіть ваш нік (@nick)">
            <button onclick="sendCode()">Отримати код</button>
        </div>
        
        <div id="code-step" class="hidden">
            <p style="color: #4caf50;">Код відправлено в чат!</p>
            <input type="number" id="input-code" placeholder="Введіть 5 цифр">
            <button onclick="verify()" style="background: #28a745;">Увійти</button>
        </div>
    </div>

    <div id="shop-screen" class="hidden">
        <h2>🛒 Магазин розблоковано</h2>
        <p>Тепер ви можете обирати товари.</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const botToken = '8557677135:AAH9yPGPO8d3Zzj5mYUI-3BtoI_BE-RZIw0';
        let generatedCode = null;

        async function sendCode() {
            const nick = document.getElementById('user-nick').value;
            if(!nick) return alert("Введіть нік!");

            // Перевірка наявності ID
            if (!tg.initDataUnsafe || !tg.initDataUnsafe.user) {
                return alert("Помилка: Telegram не передав ваш ID. Спробуйте відкрити з мобільного телефону!");
            }

            const chatId = tg.initDataUnsafe.user.id;
            generatedCode = Math.floor(10000 + Math.random() * 90000);
            
            const text = `🔐 Вітаємо, ${nick}!\nТвій код для входу: ${generatedCode}`;
            const url = `https://telegram.org{botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`;

            try {
                const response = await fetch(url);
                if (response.ok) {
                    document.getElementById('nick-step').classList.add('hidden');
                    document.getElementById('code-step').classList.remove('hidden');
                } else {
                    const err = await response.json();
                    alert("Помилка API: " + err.description);
                }
            } catch (e) {
                alert("Помилка мережі: " + e);
            }
        }

        function verify() {
            const val = document.getElementById('input-code').value;
            if (val == generatedCode) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('shop-screen').classList.remove('hidden');
                document.getElementById('profile-icon').style.display = 'block';
            } else {
                alert("Невірний код!");
            }
        }
    </script>
</body>
</html>
